repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        files: ^ai-core/
        args: [--fix]

      - id: ruff-format
        files: ^ai-core/

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        files: ^ai-core/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.1
    hooks:
      - id: mypy
        files: ^ai-core/
        additional_dependencies:
          - pydantic
          - pydantic-settings